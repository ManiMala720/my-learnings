<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codepen Tile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card-container">
    <div class="card">
      <div class="card-thumbnail">
        <img src="../assets/abstract-gradient.jpeg" alt="abstract-gradient">
      </div>
      <div class="card-content">
        <div class="card-avatar">
          <img src="../assets/cat.jpeg" alt="cat">
        </div>
        <div class="card-details">
          <h3>Abstract Gradient Project</h3>
          <p>Scrimsbee MsScrimslee</p>
        </div>
      </div>
      <ul class="card-status">
        <li><img src="../assets/heart.svg" alt="likes"><span>8</span></li>
        <li><img src="../assets/comment.svg" alt="comments" id="comment"><span>32</span></li>
      </ul>
    </div>
  </div>
</body>
</html>
